{% extends 'base.html' %}
{% block title %}CheckoutWaiting - MediaHub{% endblock %}
{% block content %}
<style>
    .spinner {
        border: 16px solid #f3f3f3;
        border-top: 16px solid #3498db;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        animation: spin 2s linear infinite;
        margin: 100px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
</style>
<div style="text-align: center">
   <div class="spinner"></div>
   <h3>A pop-up has appeared on your phone. We are processing your payment.....</h3>
   <p id="status-message"></p>
</div>
<script>
const transactionId = "{{ transaction_id }}";
const BASE_URL = "https://0b8b-197-248-224-217.ngrok-free.app/";
// check why response here is not capturing success changes 
let checkStatusInterval = setInterval(function () {
  console.log("Checking transaction status...");
  fetch(`${BASE_URL}mediampesa/check-status/${transactionId}/`)
    .then((response) => response.json())
    .then((data) => {
      console.log(JSON.stringify(data))
      if (data.status === "Success") {
        clearInterval(checkStatusInterval);
        window.location.href = `${BASE_URL}mediampesa/payment-success/`;
      } else if (data.status === "Failed") {
        clearInterval(checkStatusInterval);
        window.location.href = `${BASE_URL}mediampesa/payment-failed/`;
      } else if (data.status === "Cancelled") {
        clearInterval(checkStatusInterval);
        window.location.href = `${BASE_URL}mediampesa/payment-cancelled/`;
      }
    })
    .catch((error) => {
      console.error("Error checking transaction status:", error);
      alert("Transaction status check failed");
    });
}, 10000);


</script>



{% endblock %}
